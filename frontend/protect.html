<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protect Info | VehicleScan Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .protect-container {
      max-width: 600px;
      margin: 40px auto;
      background: var(--surface-hi);
      border: 1px solid var(--green);
      padding: 32px;
      box-shadow: 0 0 14px var(--green-glow);
    }
    .protect-container h1 {
      color: var(--green);
      font-size: 18px;
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      text-transform: uppercase;
    }
    .protect-container p {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      color: var(--green);
      font-size: 11px;
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }
    .form-group input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      padding: 12px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    .form-group input:focus {
      border-color: var(--green);
    }
    .submit-btn {
      width: 100%;
      background: var(--green);
      color: var(--bg);
      border: none;
      padding: 14px;
      font-family: var(--font);
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message-box {
      margin-top: 20px;
      padding: 12px;
      font-size: 13px;
      display: none;
    }
    .message-box.success {
      border: 1px solid var(--green);
      color: var(--green);
      background: rgba(0, 255, 65, 0.1);
    }
    .message-box.error {
      border: 1px solid var(--red);
      color: var(--red);
      background: var(--red-dim);
    }
  </style>
</head>
<body>
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>

  <div class="page-wrap">
    <header role="banner">
      <div class="logo" aria-label="VehicleScan Terminal">VEHICLE_SCAN_v2.0</div>
      <div class="header-badges" aria-hidden="true">
        <a href="index.html" style="color:var(--text); text-decoration:none;" class="badge">&lt; BACK_TO_SCANNER</a>
      </div>
    </header>

    <main role="main">
      <div class="protect-container">
        <h1>Protect Your Info</h1>
        <p>Enter your Vehicle Registration Number and the Mobile Number registered with the RTO to verify ownership. Once verified, your personal details (Name, Mobile, Father's Name) will be hidden from public searches on this platform.</p>
        
        <form id="protectForm">
          <div class="form-group">
            <label>&gt; REGISTRATION_NUMBER</label>
            <input type="text" id="regInput" placeholder="e.g. UK04AP2300" required autocomplete="off" />
          </div>
          <div class="form-group">
            <label>&gt; MOBILE_NUMBER</label>
            <input type="text" id="mobileInput" placeholder="e.g. 9876543210" required autocomplete="off" />
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">[ INITIATE_PROTECTION_PROTOCOL ]</button>
        </form>

        <div id="msgBox" class="message-box"></div>
      </div>
    </main>
  </div>

  <script src="protect.js"></script>
</body>
</html>
